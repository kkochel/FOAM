databaseChangeLog:
  - changeSet:
      id: 001-create-outbox-message
      author: foam
      changes:
        - createTable:
            tableName: outbox_message
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dataset_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP
              - column:
                  name: retry_count
                  type: INT
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
        - createIndex:
            tableName: outbox_message
            indexName: idx_outbox_message_status
            columns:
              - column:
                  name: status
